          if (item.colors && item.colors[currentPattern]) {
            colorVariations = item.colors[currentPattern].map(val => ({ hex: val, name: '', isGradient: isGradientItem }));
          } else {
            colorVariations = colorPatterns[currentPattern];
          }
          
          colorVariations.forEach(colorObj => {
            const colorItem = createEl('div', { className: 'eisai-color-item' }, colorRow);
            colorItem.style.cssText = `
              padding: 6px;
              border-radius: 10px;
              cursor: pointer;
              transition: all 0.2s ease;
              background: #f9fafb;
              border: 2px solid transparent;
            `;
            
            // プレビューを作成
            const previewDiv = createEl('div', {}, colorItem);
            let previewHTML = item.preview || '';
            
            // グラデーションの場合は特別な処理
            if (colorObj.isGradient) {
              previewHTML = applyGradientToHTML(previewHTML, colorObj.hex);
            } else {
              previewHTML = applyColorToHTML(previewHTML, colorObj.hex, categoryKey);
            }
            previewDiv.innerHTML = previewHTML;
            
            // ボーダー色（グラデーションの場合は最初の色を抽出）
            let borderColor = colorObj.hex;
            if (colorObj.isGradient) {
              const match = colorObj.hex.match(/#[0-9a-fA-F]{6}/);
              borderColor = match ? match[0] : '#3b82f6';
            }
            
            colorItem.addEventListener('mouseenter', () => {
              colorItem.style.background = '#fff';
              colorItem.style.borderColor = borderColor;
              colorItem.style.transform = 'translateY(-3px)';
              colorItem.style.boxShadow = '0 8px 20px rgba(0,0,0,0.1)';
            });
            
            colorItem.addEventListener('mouseleave', () => {
              colorItem.style.background = '#f9fafb';
              colorItem.style.borderColor = 'transparent';
              colorItem.style.transform = 'translateY(0)';
              colorItem.style.boxShadow = 'none';
            });
            
            colorItem.addEventListener('click', (e) => {
              e.preventDefault();
              e.stopPropagation();
              
              // ボタンの場合はURL入力ダイアログを表示
              if (categoryKey === 'button') {
                const url = prompt('リンク先URLを入力してください:', 'https://');
                if (url === null) return; // キャンセル
                
                // クリック直前の選択範囲を強制復元
                if (globalSavedRange) {
                  const s = window.getSelection();
                  s.removeAllRanges();
                  s.addRange(globalSavedRange);
                }
                editor.focus();

                // データを設定して適用（URLも含める）
                const data = { ...item.data, color: colorObj.hex, isGradient: colorObj.isGradient, url: url || '#' };
                applyBlock(editor, categoryKey, data);
              } else {
                // クリック直前の選択範囲を強制復元
                if (globalSavedRange) {
                  const s = window.getSelection();
                  s.removeAllRanges();
                  s.addRange(globalSavedRange);
                }
                editor.focus();

                // データを設定して適用（グラデーションフラグも含める）
                const data = { ...item.data, color: colorObj.hex, isGradient: colorObj.isGradient };
                applyBlock(editor, categoryKey, data);
              }
              
              // すべて閉じる
              menu.classList.remove('show');
              colorPopup.style.display = 'none';
              selectedItem = null;
              selectedLabelItem = null;
            });
          });
          
          // ポップアップの位置を左メニューの右側に設定
          colorPopup.style.display = 'block';
          const menuRect = menu.getBoundingClientRect();
          colorPopup.style.top = menuRect.top + 'px';
          colorPopup.style.left = (menuRect.right + 8) + 'px';
          colorPopup.style.transform = 'none';
        }

        // 装飾パーツ名リストを作成
        itemsArray.forEach((item) => {
          const labelItem = createEl('div', { className: 'eisai-label-item' }, menu);
          
          // 全カテゴリ共通：ラベルのみ表示
          labelItem.textContent = item.label;
          labelItem.style.cssText = `
            padding: 10px 20px;
            cursor: pointer;
            font-size: 13px;
            color: #374151;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
          `;
          
          labelItem.addEventListener('mouseenter', () => {
            labelItem.style.background = '#f3f4f6';
          });
          
          labelItem.addEventListener('mouseleave', () => {
            if (selectedItem !== item) {
              labelItem.style.background = 'transparent';
              labelItem.style.borderLeftColor = 'transparent';
            }
          });
          
          labelItem.addEventListener('click', (e) => {
            e.stopPropagation();
            
            // 前の選択をリセット
            if (selectedLabelItem) {
              selectedLabelItem.style.background = 'transparent';
              selectedLabelItem.style.borderLeftColor = 'transparent';
            }
            
            selectedItem = item;
            selectedLabelItem = labelItem;
            
            // 選択状態をハイライト
            labelItem.style.background = '#e0e7ff';
            labelItem.style.borderLeftColor = '#3b82f6';
            
            // 色バリエーションポップアップを表示（メニューは開いたまま）
            showColorVariations(item, labelItem);
          });
        });

        btn.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          
          // 他のメニューを閉じる
          document.querySelectorAll('.eisai-dropdown-menu.show').forEach(m => {
            if (m !== menu) m.classList.remove('show');
          });
          document.querySelectorAll('.eisai-color-popup').forEach(p => {
            p.style.display = 'none';
          });
          
          menu.classList.toggle('show');
          
          // メニューを閉じるときは色ポップアップも閉じる
          if (!menu.classList.contains('show')) {
            colorPopup.style.display = 'none';
            selectedItem = null;
            if (selectedLabelItem) {
              selectedLabelItem.style.background = 'transparent';
              selectedLabelItem.style.borderLeftColor = 'transparent';
              selectedLabelItem = null;
            }
          }
        };

        // 外側クリックで閉じる
        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target) && !colorPopup.contains(e.target)) {
            menu.classList.remove('show');
            colorPopup.style.display = 'none';
            selectedItem = null;
            if (selectedLabelItem) {
              selectedLabelItem.style.background = 'transparent';
              selectedLabelItem.style.borderLeftColor = 'transparent';
              selectedLabelItem = null;
            }
          }
        });

        return dropdown;
      }

      function createDropdown(toolbar, label, buildMenuContent, icon = null) {
        const dropdown = createEl('div', { className: 'eisai-dropdown' }, toolbar);
        const btn = createEl('button', { className: 'eisai-dropdown-btn' }, dropdown);
        btn.innerHTML = icon + label;
        const menu = createEl('div', { className: 'eisai-dropdown-menu' }, dropdown);

        // フォーカス維持
        btn.onmousedown = (e) => e.preventDefault();

        // メニュー内容を構築
        buildMenuContent(menu);

        btn.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          document.querySelectorAll('.eisai-dropdown-menu.show').forEach(m => {
            if (m !== menu) m.classList.remove('show');
          });
          menu.classList.toggle('show');
        };

        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target)) {
            menu.classList.remove('show');
          }
        });

        return dropdown;
      }

      // パネル生成
      const panel = createEl('div', { id: TOOL_ID }, target);

      // ========================================
      // 固定ヘッダー部分（プリセット + ツールバー）
      // ========================================
      const fixedHeader = createEl('div', { className: 'eisai-fixed-header' }, panel);

      // ========================================
      // プリセットモードUI
      // ========================================
      const presetContainer = createEl('div', { className: 'preset-mode-container' }, fixedHeader);
      
      // ヘッダー（タイトル + カスタムモード切り替え）
      const presetHeader = createEl('div', { className: 'preset-mode-header' }, presetContainer);
      const presetTitle = createEl('span', { className: 'preset-mode-title' }, presetHeader, '🎨 テーマ選択');
      const presetToggle = createEl('div', { className: 'preset-mode-toggle' }, presetHeader);
      const customHintText = createEl('span', {}, presetToggle, 'カスタムモード');
      const toggleSwitch = createEl('div', { className: 'toggle-switch' }, presetToggle);
      let isCustomMode = false;
      
      // テーマ選択ドロップダウン
      const themeSelector = createEl('select', { className: 'theme-selector' }, presetContainer);
      Object.keys(PRESET_THEMES).forEach(key => {
        const option = document.createElement('option');
        option.value = key;
        option.textContent = PRESET_THEMES[key].name;
        if (key === currentTheme) option.selected = true;
        themeSelector.appendChild(option);
      });
      
      // テーマ説明
      const themeDescription = createEl('div', { className: 'theme-description' }, presetContainer);
      themeDescription.textContent = PRESET_THEMES[currentTheme].description;
      
      // プリセットボタン群
      const presetButtons = createEl('div', { className: 'preset-buttons' }, presetContainer);
      
      const presetBtnData = [
        { type: 'heading', label: '見出し', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12h8M4 6h16M4 18h16"/></svg>' },
        { type: 'subheading', label: 'サブ見出し', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 12h12M6 6h12M6 18h8"/></svg>' },
        { type: 'box', label: '枠', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>' },
        { type: 'bubbleLeft', label: '吹き出し←', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' },
        { type: 'bubbleRight', label: '吹き出し→', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 15a2 2 0 002 2h10l4 4V5a2 2 0 00-2-2H5a2 2 0 00-2 2z"/></svg>' },
        { type: 'button', label: 'ボタン', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="8" width="18" height="8" rx="4"/></svg>' },
        { type: 'list', label: 'リスト', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>' }
      ];
      
      presetBtnData.forEach(btn => {
        const presetBtn = createEl('button', { className: 'preset-btn' }, presetButtons);
        presetBtn.innerHTML = btn.icon + '<span>' + btn.label + '</span>';
        // mousedownで選択範囲を保存（フォーカスが外れる前に）
        presetBtn.onmousedown = (e) => {
          e.preventDefault();
          const sel = window.getSelection();
          if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
            globalSavedRange = sel.getRangeAt(0).cloneRange();
          }
        };
        presetBtn.onclick = () => insertPresetElement(editor, btn.type);
      });
      
            
      // テーマ変更時の処理
      themeSelector.onchange = () => {
        currentTheme = themeSelector.value;
        themeDescription.textContent = PRESET_THEMES[currentTheme].description;
        // テーマカラーでボタンの色を変更
        const color = PRESET_THEMES[currentTheme].color;
        presetButtons.querySelectorAll('.preset-btn').forEach(btn => {
          btn.style.borderColor = color;
        });
      };
      
      // カスタムモード切り替え（トグルスイッチ）
      toggleSwitch.onclick = () => {
        isCustomMode = !isCustomMode;
        toggleSwitch.classList.toggle('active', isCustomMode);
        isPresetMode = !isCustomMode;
        // カスタムモードの場合、ツールバーのカテゴリを表示
        const categoryContainer = document.querySelector('.eisai-category-container');
        if (categoryContainer) {
          categoryContainer.style.display = isCustomMode ? 'flex' : 'none';
        }
        // プリセットボタンの表示/非表示
        presetButtons.style.display = isCustomMode ? 'none' : 'grid';
        themeSelector.style.display = isCustomMode ? 'none' : 'block';
        themeDescription.style.display = isCustomMode ? 'none' : 'block';
        presetTitle.textContent = isCustomMode ? '🔧 カスタムモード' : '🎨 テーマ選択';
      };

      // ツールバー（2列レイアウト用）- 固定ヘッダーに追加
      const toolbarContainer = createEl('div', { className: 'eisai-toolbar-container' }, fixedHeader);
      const row1Toolbar = createEl('div', { className: 'eisai-toolbar' }, toolbarContainer);
      const row2Toolbar = createEl('div', { className: 'eisai-toolbar' }, toolbarContainer);
      
      const editorArea = createEl('div', { className: 'eisai-editor-container' }, panel);
      const editor = createEl('div', { className: 'eisai-editor' }, editorArea);
      editor.contentEditable = 'true';
      
      // サイドバー（左カラム）のGEMINI HTML貼り付け下だけにHTML出力ボタンを配置
      const leftGeminiExport = document.getElementById('sidebar-html-export');
      if (leftGeminiExport) {
        createLargeHtmlExportButton(leftGeminiExport);
      }

      // 選択範囲を保存（ボタンクリック時にフォーカスが外れても復元できるようにする）
      const saveSelection = () => {
        const sel = window.getSelection();
        if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
          globalSavedRange = sel.getRangeAt(0);
        }
      };
      // 入力操作やマウス操作時のみ更新する（エディタ外へフォーカスが移った blur では上書きしない）
      editor.addEventListener('keyup', saveSelection);
      editor.addEventListener('mouseup', saveSelection);
      
      // 装飾ブロックかどうかを判定するヘルパー関数
      function isDecorationElement(el) {
        if (!el || el === editor) return false;
        if (el.tagName === 'BUTTON') return true;
        if (el.tagName === 'FIELDSET') return true;
        if (el.tagName === 'UL' || el.tagName === 'OL') return true;
        if (el.tagName === 'DIV' && el.style) {
          const hasDecoration = el.style.background || 
            el.style.backgroundColor || 
            el.style.border || 
            el.style.borderRadius ||
            el.style.boxShadow ||
            (el.style.padding && el.style.padding !== '0px') ||
            (el.className && typeof el.className === 'string' && 
             (el.className.includes('targetlist_') || el.className.includes('eisai-')));
          if (hasDecoration) return true;
        }
        return false;
      }
      
      // リスト内でのBackspace/Delete動作を制御
      editor.addEventListener('keydown', (e) => {
        if (e.key !== 'Backspace' && e.key !== 'Delete') return;
        
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return;
        
        const range = sel.getRangeAt(0);
        if (!range.collapsed) return; // 選択範囲がある場合は通常動作
        
        let node = range.startContainer;
        const originalNode = node;
        if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
        
        // 通常テキスト（p, div等）から装飾への侵食を防ぐ
        // エディタ直下の要素を取得
        let directChild = node;
        while (directChild && directChild.parentElement !== editor) {
          directChild = directChild.parentElement;
        }
        
        if (directChild && !isDecorationElement(directChild)) {
          // 通常テキスト内にいる場合
          
          // Backspace: 先頭で前の要素が装飾なら侵食を防ぐ
          if (e.key === 'Backspace' && range.startOffset === 0) {
            // 現在のノードがdirectChildの最初のテキストノードかチェック
            let firstTextNode = null;
            const walker = document.createTreeWalker(directChild, NodeFilter.SHOW_TEXT, null, false);
            firstTextNode = walker.nextNode();
            
            if (firstTextNode && originalNode === firstTextNode) {
              const prevSibling = directChild.previousElementSibling;
              if (prevSibling && isDecorationElement(prevSibling)) {
                e.preventDefault();
                return;
              }
            }
          }
          
          // Delete: 末尾で次の要素が装飾なら侵食を防ぐ
          if (e.key === 'Delete') {
            const textNode = originalNode;
            if (textNode.nodeType === Node.TEXT_NODE && range.startOffset === textNode.textContent.length) {
              // 最後のテキストノードかチェック
              const allTextNodes = [];
              const walker = document.createTreeWalker(directChild, NodeFilter.SHOW_TEXT, null, false);
              let n;
              while (n = walker.nextNode()) allTextNodes.push(n);
              
              if (allTextNodes.length > 0 && textNode === allTextNodes[allTextNodes.length - 1]) {
                const nextSibling = directChild.nextElementSibling;
                if (nextSibling && isDecorationElement(nextSibling)) {
                  e.preventDefault();
                  return;
                }
              }
            }
          }
        }
        
        // li要素内かどうかチェック
        let liElement = null;
        let current = node;
        while (current && current !== editor) {
          if (current.tagName === 'LI') {
            liElement = current;
            break;
          }
          current = current.parentNode;
        }
        
        // li要素がない場合、装飾ブロック内かチェック
        if (!liElement) {
          // ボタン要素内かチェック
          let buttonElement = null;
          current = node;
          while (current && current !== editor) {
            if (current.tagName === 'BUTTON') {
              buttonElement = current;
              break;
            }
            current = current.parentNode;
          }
          
          // ボタン内の先頭でBackspaceが押された場合、ボタン外への侵食を防ぐ
          if (buttonElement && e.key === 'Backspace' && range.collapsed && range.startOffset === 0) {
            // 現在のノードがボタンの最初のテキストノードかチェック
            let firstTextNode = null;
            const walker = document.createTreeWalker(buttonElement, NodeFilter.SHOW_TEXT, null, false);
            firstTextNode = walker.nextNode();
            
            if (firstTextNode && range.startContainer === firstTextNode) {
              // ボタンの先頭なので侵食を防ぐ
              e.preventDefault();
              return;
            }
          }
          
          // ボタン内の末尾でDeleteが押された場合、下の要素への侵食を防ぐ
          if (buttonElement && e.key === 'Delete' && range.collapsed) {
            const textNode = range.startContainer;
            if (textNode.nodeType === Node.TEXT_NODE && range.startOffset === textNode.textContent.length) {
              // 最後のテキストノードかチェック
              const allTextNodes = [];
              const walker = document.createTreeWalker(buttonElement, NodeFilter.SHOW_TEXT, null, false);
              let n;
              while (n = walker.nextNode()) allTextNodes.push(n);
              if (allTextNodes.length > 0 && textNode === allTextNodes[allTextNodes.length - 1]) {
                e.preventDefault();
                return;
              }
            }
          }
          
          // 装飾ブロック（吹き出し、BOX、枠など）を検出
          let decorationBlock = null;
          current = node;
          while (current && current !== editor) {
            if (current.tagName === 'DIV' && current.style) {
              // 吹き出し、BOX、枠などの装飾ブロックを検出
              const hasDecoration = current.style.background || 
                current.style.backgroundColor || 
                current.style.border || 
                current.style.borderRadius ||
                current.style.boxShadow ||
                current.style.padding ||
                (current.className && typeof current.className === 'string' && 
                 (current.className.includes('targetlist_') || current.className.includes('eisai-')));
              
              // エディタ直下の装飾ブロックかチェック
              if (hasDecoration && current.parentElement === editor) {
                decorationBlock = current;
                break;
              }
              // または親がエディタ直下の装飾ブロック
              if (hasDecoration && current.parentElement && current.parentElement.parentElement === editor) {
                decorationBlock = current.parentElement;
                break;
              }
            }
            current = current.parentNode;
          }
          
          // 装飾ブロック内の先頭でBackspaceが押された場合、ブロック外への侵食を防ぐ
          if (decorationBlock && e.key === 'Backspace' && range.collapsed) {
            // カーソル位置がブロックの先頭かチェック
            const blockRange = document.createRange();
            blockRange.selectNodeContents(decorationBlock);
            blockRange.collapse(true);
            
            // ブロックの先頭にカーソルがある場合
            if (range.startOffset === 0) {
              // 現在のノードがブロックの最初のテキストノードかチェック
              let firstTextNode = null;
              const walker = document.createTreeWalker(decorationBlock, NodeFilter.SHOW_TEXT, null, false);
              firstTextNode = walker.nextNode();
              
              if (firstTextNode && (range.startContainer === firstTextNode || 
                  (range.startContainer.nodeType !== Node.TEXT_NODE && 
                   decorationBlock.contains(range.startContainer)))) {
                // ブロックの先頭なので侵食を防ぐ
                e.preventDefault();
                return;
              }
            }
          }
          
          // 装飾ブロック内の末尾でDeleteが押された場合、下の要素への侵食を防ぐ
          if (decorationBlock && e.key === 'Delete' && range.collapsed) {
            const textNode = range.startContainer;
            if (textNode.nodeType === Node.TEXT_NODE && range.startOffset === textNode.textContent.length) {
              // 最後のテキストノードかチェック
              const allTextNodes = [];
              const walker = document.createTreeWalker(decorationBlock, NodeFilter.SHOW_TEXT, null, false);
              let n;
              while (n = walker.nextNode()) allTextNodes.push(n);
              if (allTextNodes.length > 0 && textNode === allTextNodes[allTextNodes.length - 1]) {
                e.preventDefault();
                return;
              }
            }
          }
          
          // data-list-converted属性を持つdivかチェック
          let convertedDiv = null;
          current = node;
          while (current && current !== editor) {
            if (current.tagName === 'DIV' && current.hasAttribute('data-list-converted')) {
              convertedDiv = current;
              break;
            }
            current = current.parentNode;
          }
          
          // 変換されたdivの先頭でBackspaceが押された場合
          if (convertedDiv && e.key === 'Backspace' && range.collapsed && range.startOffset === 0) {
            // 前の要素がタイトル（div/span/p）かチェック
            const prevSibling = convertedDiv.previousElementSibling;
            if (prevSibling && 
                (prevSibling.tagName === 'DIV' || prevSibling.tagName === 'SPAN' || prevSibling.tagName === 'P') && 
                (prevSibling.style.background || prevSibling.style.fontWeight === 'bold' || 
                 prevSibling.style.backgroundColor || prevSibling.style.position === 'absolute')) {
              // タイトルへの侵食を防ぐ
              e.preventDefault();
              return;
            }
            // 前の要素がない場合も侵食を防ぐ（リストボックスの先頭）
            if (!prevSibling) {
              e.preventDefault();
              return;
            }
            // 前の要素がul/olの場合も侵食を防ぐ
            if (prevSibling.tagName === 'UL' || prevSibling.tagName === 'OL') {
              e.preventDefault();
              return;
            }
          }
          
          return;
        }
        
        // li要素の先頭でBackspaceが押された場合
        if (e.key === 'Backspace' && range.collapsed && range.startOffset === 0) {
          // 最初のli要素かどうかチェック
          const ul = liElement.parentNode;
          if (ul && (ul.tagName === 'UL' || ul.tagName === 'OL')) {
            const isFirstLi = liElement === ul.firstElementChild;
            
            if (isFirstLi) {
              // 最初のliの場合、タイトルへの侵食を防ぐ
              e.preventDefault();
              
              const text = liElement.textContent;
              const nextLi = liElement.nextElementSibling;
              
              if (text.trim() === '') {
                // テキストが空の場合
                if (nextLi) {
                  // 次のliがあれば削除して次に移動
                  liElement.remove();
                  const newRange = document.createRange();
                  newRange.setStart(nextLi, 0);
                  newRange.collapse(true);
                  sel.removeAllRanges();
                  sel.addRange(newRange);
                }
                // 最後の1つなら削除しない
              } else {
                // テキストがある場合、liをul外のプレーンテキストに変換
                // ulの直前にdivとして挿入（パディングを維持）
                const div = document.createElement('div');
                div.textContent = text;
                div.style.padding = '15px 20px';
                div.setAttribute('data-list-converted', 'true');
                
                // ulの親要素（リストボックス）を取得
                let listBoxParent = ul.parentNode;
                
                // カスタムツールのリスト（targetlist_クラス）かチェック
                const isCustomList = listBoxParent.className && 
                  typeof listBoxParent.className === 'string' && 
                  listBoxParent.className.includes('targetlist_');
                
                // テーマのリストかチェック（親がdivでborderやbackgroundを持つ）
                const isThemeList = listBoxParent.tagName === 'DIV' && 
                  listBoxParent.style && 
                  (listBoxParent.style.border || listBoxParent.style.background || 
                   listBoxParent.style.backgroundColor || listBoxParent.style.borderRadius);
                
                if (isCustomList || isThemeList) {
                  // リストボックス内にulの直前に挿入
                  listBoxParent.insertBefore(div, ul);
                } else {
                  // その他の場合、ulの直前に挿入
                  listBoxParent.insertBefore(div, ul);
                }
                
                liElement.remove();
                
                // ulが空になったらul自体を削除
                if (ul.children.length === 0) {
                  ul.remove();
                } else {
                  // ulが残っている場合、ulの上パディングを調整
                  ul.style.paddingTop = '10px';
                }
                
                // カーソルをdivの先頭に移動
                const newRange = document.createRange();
                if (div.firstChild) {
                  newRange.setStart(div.firstChild, 0);
                } else {
                  newRange.setStart(div, 0);
                }
                newRange.collapse(true);
                sel.removeAllRanges();
                sel.addRange(newRange);
              }
            } else {
              // 最初のliでない場合、前のliと結合
              const prevLi = liElement.previousElementSibling;
              if (prevLi) {
                e.preventDefault();
                
                // 現在のliの内容を前のliに追加
                const prevTextLength = prevLi.textContent.length;
                prevLi.innerHTML += liElement.innerHTML;
                liElement.remove();
                
                // カーソルを結合位置に移動
                const textNode = prevLi.firstChild;
                if (textNode) {
                  const newRange = document.createRange();
                  if (textNode.nodeType === Node.TEXT_NODE) {
                    newRange.setStart(textNode, prevTextLength);
                  } else {
                    newRange.setStart(prevLi, 0);
                  }
                  newRange.collapse(true);
                  sel.removeAllRanges();
                  sel.addRange(newRange);
                }
              }
            }
          }
        }
        
        // li要素の末尾でDeleteが押された場合
        if (e.key === 'Delete' && range.collapsed) {
          const textNode = range.startContainer;
          const isAtEnd = textNode.nodeType === Node.TEXT_NODE && range.startOffset === textNode.textContent.length;
          
          if (isAtEnd) {
            const nextLi = liElement.nextElementSibling;
            if (nextLi && nextLi.tagName === 'LI') {
              e.preventDefault();
              
              // 次のliの内容を現在のliに追加
              liElement.innerHTML += nextLi.innerHTML;
              nextLi.remove();
            } else {
              // 最後のli要素の場合、下の要素への侵食を防ぐ
              e.preventDefault();
              return;
            }
          }
        }
      });
      
      // ブロック要素（リスト、枠、吹き出し）のダブルクリックで配置変更ダイアログを表示
      // ※見出し（横幅いっぱい）は除外
      editor.addEventListener('dblclick', async (e) => {
        // テーブルセルのダブルクリックで行・列操作メニューを表示
        let cellTarget = e.target;
        while (cellTarget && cellTarget !== editor) {
          if (cellTarget.tagName === 'TD' || cellTarget.tagName === 'TH') {
            const row = cellTarget.parentNode;
            const table = cellTarget.closest('table');
            if (table) {
              e.preventDefault();
              e.stopPropagation();
              showTableCellMenu(table, row, cellTarget, e.clientX, e.clientY);
              return;
            }
          }
          cellTarget = cellTarget.parentNode;
        }
        
        // クリックされた要素から配置変更可能なブロックを探す
        let target = e.target;
        let block = null;
        
        // 親要素を辿ってブロック要素を探す
        while (target && target !== editor) {
          // カスタムツールの枠・BOX/リスト（targetlist_クラス）は配置変更対象外
          if (target.className && typeof target.className === 'string' && target.className.includes('targetlist_')) {
            // カスタムツールのリストは配置変更しない
            return;
          }
          // fit-contentを持つdiv（リスト、枠、吹き出し）
          // ただしカスタムツールは除外
          if (target.style && target.style.width === 'fit-content') {
            // 親にtargetlist_クラスがあるかチェック
            let isCustomTool = false;
            let parent = target;
            while (parent && parent !== editor) {
              if (parent.className && typeof parent.className === 'string' && parent.className.includes('targetlist_')) {
                isCustomTool = true;
                break;
              }
              parent = parent.parentElement;
            }
            if (isCustomTool) {
              return;
            }
            block = target;
            break;
          }
          // border や background を持つdiv（枠・BOX）
          // ただし横幅いっぱい（見出し）は除外
          if (target.tagName === 'DIV' && target.style && 
              (target.style.border || target.style.background || target.style.backgroundColor || 
               target.style.boxShadow || target.style.borderRadius)) {
            // 横幅いっぱいの要素（見出し）は除外
            const width = target.style.width;
            if (width === '100%' || width === '' || width === 'auto') {
              // 見出しの可能性が高いのでスキップ
              target = target.parentElement;
              continue;
            }
            // エディタ直下の子要素、または明らかなブロック要素
            if (target.parentElement === editor || target.style.padding || target.style.margin) {
              block = target;
              break;
            }
          }
          target = target.parentElement;
        }
        
        if (!block) return;
        
        // 見出し（横幅いっぱい）は配置変更しない
        const blockWidth = block.style.width;
        if (!blockWidth || blockWidth === '100%' || blockWidth === 'auto') {
          return;
        }
        
        // 配置選択ダイアログを表示
        const alignment = await showListAlignmentDialog();
        
        // width: fit-content を設定（まだ設定されていない場合）
        if (!block.style.width || block.style.width === 'auto' || block.style.width === '100%') {
          block.style.width = 'fit-content';
        }
        
        // 配置を適用
        const currentMargin = block.style.margin || '';
        const marginMatch = currentMargin.match(/^(\d+(?:\.\d+)?(?:em|px)?)/);
        const topMargin = marginMatch ? marginMatch[1] : '1em';
        
        switch (alignment) {
          case 'left':
            block.style.margin = `${topMargin} auto ${topMargin} 0`;
            break;
          case 'right':
            block.style.margin = `${topMargin} 0 ${topMargin} auto`;
            break;
          case 'center':
          default:
            block.style.margin = `${topMargin} auto`;
            break;
        }
        
        editor.focus();
      });

      // 基本書式ツールバー（SVGアイコン）
      createIconButton(row1Toolbar, editor, '元に戻す', ICONS.undo, () => {
        editor.focus();
        document.execCommand('undo');
      });
      createIconButton(row1Toolbar, editor, 'やり直し', ICONS.redo, () => {
        editor.focus();
        document.execCommand('redo');
      });
      createEl('div', { className: 'eisai-toolbar-separator' }, row1Toolbar);
      // 太字: フォントサイズ用の span 内でも確実に効くように、CSS ベースで適用
      createIconButton(row1Toolbar, editor, '太字', ICONS.bold, () => {
        editor.focus();
        try {
          document.execCommand('styleWithCSS', false, true);
        } catch (e) {}
        document.execCommand('bold');
        try {
          document.execCommand('styleWithCSS', false, false);
        } catch (e) {}
      });
      createIconButton(row1Toolbar, editor, '斜体', ICONS.italic, () => document.execCommand('italic'));
      createIconButton(row1Toolbar, editor, '下線', ICONS.underline, () => document.execCommand('underline'));
      createIconButton(row1Toolbar, editor, '取り消し線', ICONS.strikethrough, () => document.execCommand('strikeThrough'));
      createEl('div', { className: 'eisai-toolbar-separator' }, row1Toolbar);
      createIconButton(row1Toolbar, editor, '左揃え', ICONS.alignLeft, () => document.execCommand('justifyLeft'));
      createIconButton(row1Toolbar, editor, '中央揃え', ICONS.alignCenter, () => document.execCommand('justifyCenter'));
      createIconButton(row1Toolbar, editor, '右揃え', ICONS.alignRight, () => document.execCommand('justifyRight'));

      // セパレータ
      createEl('div', { className: 'eisai-toolbar-separator' }, row1Toolbar);

      // 文字サイズ
      createDropdown(row1Toolbar, 'サイズ', (menu) => {
        // メニューが全項目見えるように高さ制限を解除し、幅もなりゆきにする
        menu.style.maxHeight = 'none';
        menu.style.minWidth = 'auto';
        menu.style.whiteSpace = 'nowrap';

        const sizes = [
          { val: 1, label: '1 (極小)', px: '10px' },
          { val: 2, label: '2 (小)', px: '13px' },
          { val: 3, label: '3 (標準)', px: '16px' },
          { val: 4, label: '4 (大)', px: '18px' },
          { val: 5, label: '5 (特大)', px: '24px' },

        sizes.forEach(sizeDef => {

          item.textContent = sizeDef.label;
          // 実際のサイズで表示（ボタン自体のスタイルを上書き）
          item.style.fontSize = sizeDef.px;
          item.onmousedown = (e) => e.preventDefault();
          item.onclick = () => {
            if (globalSavedRange) {
              const sel = window.getSelection();
              sel.removeAllRanges();
              sel.addRange(globalSavedRange);

            editor.focus();

            menu.classList.remove('show');
          };

      // スタイルツールバー（文字色・背景色・マーカー）
      createColorPicker(row1Toolbar, 'text');
      createColorPicker(row1Toolbar, 'bg');
      createColorPicker(row1Toolbar, 'marker');
      
      // 書式クリアボタン（ツールバー内）
      const clearBtn = createEl('button', { className: 'eisai-dropdown-btn' }, row1Toolbar);
      clearBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>クリア';
      clearBtn.title = '書式クリア';
      clearBtn.onmousedown = (e) => e.preventDefault();
      clearBtn.onclick = () => {
        editor.focus();
        clearFormatting(editor);
      };

      // 全クリアボタン（装飾をすべて削除してテキストのみ）
      const allClearBtn = createEl('button', { className: 'eisai-dropdown-btn' }, row1Toolbar);
      allClearBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14zM10 11v6M14 11v6"/></svg>全クリア';
      allClearBtn.title = '装飾をすべて削除してテキストのみ';
      allClearBtn.onmousedown = (e) => e.preventDefault();
      allClearBtn.onclick = () => {
        editor.focus();
        // 全クリア機能：装飾をすべて削除してテキストと改行のみ
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = editor.innerHTML;
        
        // ブロック要素ごとにテキストを抽出して改行を保持
        let plainText = '';
        const blockElements = tempDiv.querySelectorAll('div, p, h1, h2, h3, h4, h5, h6, li, blockquote');
        
        if (blockElements.length > 0) {
          // ブロック要素がある場合、各要素のテキストを改行で連結
          blockElements.forEach((el, index) => {
            const text = el.textContent || el.innerText;
            if (text.trim()) {
              plainText += text.trim();
              if (index < blockElements.length - 1) {
                plainText += '\n\n'; // 段落間は2行改行
              }
            }
          });
        } else {
          // ブロック要素がない場合は全体のテキストを使用
          plainText = tempDiv.innerText || tempDiv.textContent;
        }
        
        // 余分な改行を調整
        plainText = plainText.replace(/\n{3,}/g, '\n\n').trim();
        
        // プレーンテキストをエディタに設定
        editor.innerHTML = plainText.replace(/\n/g, '<br>');
      };

      // 装飾ツールバー（順番: 見出し→枠・BOX→吹き出し→ボタン→リスト）

      // 挿入ドロップダウン（装飾の後ろ）

          b.onmousedown = (e) => e.preventDefault();

            e.preventDefault();
            applyBlock(editor, 'insert', item);
            menu.classList.remove('show');
          };
        });
      }, ICONS.table);

      return {
        setContent(content) {
          editor.innerHTML = content;
        },
        getHtml() {
          return editor.innerHTML;
        },
        focus() {
          editor.focus();
        }
      };
    }

    // === すべてのインライン装飾要素に!importantを追加する汎用関数 ===
    function preserveInlineFormatting(element) {
      // 処理する装飾要素のセレクタ（li要素は除外してリストスタイルを保護）
      const formattingSelectors = [
        'strong', 'b', 'em', 'i', 'u', 's', 'del', 'mark',
        'span[style*="color"]', 'span[style*="background"]', 'span[style*="font-weight"]',
        'span[style*="font-style"]', 'span[style*="text-decoration"]'
      ];
      
      formattingSelectors.forEach(selector => {
        const elements = element.querySelectorAll(selector);
        elements.forEach(el => {
          // li要素は処理しない（リストスタイルを保護）
          if (el.tagName === 'LI') {
            return;
          }
          
          const existingStyle = el.getAttribute('style') || '';
          if (existingStyle) {
            // 既存のスタイルを個別に処理してすべてのプロパティに!importantを追加
            const properties = existingStyle.split(';').filter(prop => prop.trim());
            const newProperties = properties.map(prop => {
              const trimmed = prop.trim();
              if (trimmed) {
                // 既に!importantがあっても、すべてのプロパティに明示的に追加
                if (trimmed.includes('!important')) {
                  return trimmed;
                } else {
                  return trimmed + ' !important';
                }
              }
              return trimmed;
            });
            el.setAttribute('style', newProperties.join('; ') + (newProperties.length > 0 ? ';' : ''));
          } else {
            // スタイルがない要素にはデフォルトスタイルを追加
            switch (el.tagName) {
              case 'STRONG':
              case 'B':
                el.setAttribute('style', 'font-weight: bold !important;');
                break;
              case 'EM':
              case 'I':
                el.setAttribute('style', 'font-style: italic !important;');
                break;
              case 'U':
                el.setAttribute('style', 'text-decoration: underline !important;');
                break;
              case 'S':
              case 'DEL':
                el.setAttribute('style', 'text-decoration: line-through !important;');
                break;
              case 'MARK':
                el.setAttribute('style', 'background-color: yellow !important; color: black !important;');
                break;
            }
          }
        });
      });
      
      // ブログシステムがstrongをspanに変換することを考慮し、
      // 予防的にspan要素にもfont-weightを設定（li内のspanは除外）
      const allSpans = element.querySelectorAll('span');
      allSpans.forEach(span => {
        // li要素内のspanは処理しない
        if (span.closest('li')) {
          return;
        }
        
        const existingStyle = span.getAttribute('style') || '';
        if (!existingStyle.includes('font-weight') && 
            (span.textContent.includes('**') || span.parentElement.tagName === 'STRONG')) {
          // 太字っぽいspanにはfont-weightを追加
          span.setAttribute('style', existingStyle + (existingStyle ? '; ' : '') + 'font-weight: bold !important;');
        }
      });
    }

    // === テーマクラスをインラインスタイルに変換する関数 ===
    // エディタ内CSSと同じスタイルをインラインで出力する
    function convertThemeClassesToInlineStyles(html) {
      // 一時的なdivを作成してHTMLを解析
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      
      // 現在選択中のテーマを取得
      const themeSelector = document.querySelector('.theme-selector');
      const selectedTheme = themeSelector ? themeSelector.value : 'business-blue';
      const theme = window.PRESET_THEMES[selectedTheme];
      
      if (!theme) {
        console.warn('テーマが見つかりません:', selectedTheme);
        return html;
      }
      
      // 標準的なH2/H3タグをテーマスタイルに変換
      tempDiv.querySelectorAll('h2').forEach(el => {
        const text = el.textContent || el.innerHTML;
        el.outerHTML = `<div style="background: ${theme.lightColor} !important; border-left: 5px solid ${theme.color} !important; padding: 15px 20px !important; font-size: 120% !important; font-weight: bold !important; margin: 20px 0 !important; line-height: 1.8 !important;">${text}</div>`;
      });
      
      tempDiv.querySelectorAll('h3').forEach(el => {

        el.outerHTML = `<div style="color: ${theme.color} !important; font-size: 105% !important; font-weight: bold !important; margin: 15px 0 !important; padding: 8px 0 !important; border-bottom: 2px solid ${theme.subColor} !important; padding-left: 10px !important; line-height: 1.8 !important;">${text}</div>`;
      });
      
      // テーマ見出しを変換 - エディタ内CSSと同じデザイン
      // エディタCSS: background: #ebf5fb; border-left: 5px solid #2980b9; padding: 15px 20px; font-size: 120%; font-weight: bold; margin: 20px 0;

      });
      
      // テーマサブ見出しを変換 - H3用の軽量なデザイン
      tempDiv.querySelectorAll('.theme-subheading').forEach(el => {
        const text = el.textContent || el.innerHTML;
        el.outerHTML = `<div style="color: ${theme.color} !important; font-size: 110% !important; font-weight: 600 !important; margin: 15px 0 !important; padding: 8px 0 !important; border-bottom: 3px solid ${theme.color} !important; padding-left: 10px !important;">${text}</div>`;
      });
      
      // テーマ吹き出し（右）を変換 - 右寄せ + 吹き出し口（右側に三角形）
      tempDiv.querySelectorAll('.theme-bubble-right').forEach(el => {
        // 装飾用のspanタグを除去してテキストのみ取得
        const tempContainer = document.createElement('div');
        tempContainer.innerHTML = el.innerHTML;
        tempContainer.querySelectorAll('span').forEach(span => span.remove());
        const text = tempContainer.innerHTML;
        // 右寄せ + 吹き出し口を右側に配置 + 右側余白を追加（margin-right: 30px）
        el.outerHTML = `<div style="text-align: right; margin: 1em 0;"><div style="display: inline-block; position: relative; background: ${theme.lightColor}; color: #154360; border-radius: 20px; padding: 12px 16px; max-width: 80%; line-height: 1.6; text-align: left; margin-right: 30px;">${text}<span style="position: absolute; right: -16px; top: 50%; transform: translateY(-50%); border: 10px solid transparent; border-left: 16px solid ${theme.lightColor};"></span></div></div>`;
      });
      
      // テーマ吹き出し（左）を変換 - 左寄せ + 吹き出し口（左側に三角形）
      tempDiv.querySelectorAll('.theme-bubble-left').forEach(el => {
        // 装飾用のspanタグを除去してテキストのみ取得
        const tempContainer = document.createElement('div');
        tempContainer.innerHTML = el.innerHTML;
        tempContainer.querySelectorAll('span').forEach(span => span.remove());
        const text = tempContainer.innerHTML;
        // 左寄せ + 吹き出し口を左側に配置
        el.outerHTML = `<div style="text-align: left; margin: 1em 0;"><div style="display: inline-block; position: relative; background: ${theme.color}; color: #fff; border-radius: 20px; padding: 12px 16px; max-width: 80%; line-height: 1.6; text-align: left; margin-left: 20px;">${text}<span style="position: absolute; left: -16px; top: 50%; transform: translateY(-50%); border: 10px solid transparent; border-right: 16px solid ${theme.color};"></span></div></div>`;
      });
      
      // テーマボックスを変換 - エディタ内CSSと同じデザイン
      // エディタCSS: border: 1px solid #2980b9; border-radius: 4px; padding: 20px; margin: 1em 0;
      tempDiv.querySelectorAll('.theme-box').forEach(el => {
        const text = el.textContent || el.innerHTML;
        el.outerHTML = `<div style="border: 1px solid ${theme.color}; border-radius: 4px; padding: 20px; margin: 1em 0;">${text}</div>`;
      });
      
      // テーマボタンを変換 - エディタ内CSSと同じデザイン
      // エディタCSS: display: block; margin: 20px auto; padding: 12px 30px; background: #2980b9; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
      tempDiv.querySelectorAll('.theme-button').forEach(el => {
        const text = el.textContent || el.innerHTML;

      });
      
      // テーマリストを変換 - エディタ内CSSと同じデザイン
      // エディタCSS: border: 2px solid #2980b9; border-radius: 6px; margin: 1em 0; overflow: hidden;
      // タイトル: background: #2980b9; color: #fff; padding: 8px 15px; font-weight: bold;
      // ul: margin: 0; padding: 15px 15px 15px 35px;
      tempDiv.querySelectorAll('.theme-list').forEach(el => {
        const titleEl = el.querySelector('.theme-list-title');
        const listEl = el.querySelector('ul');
        
        if (titleEl && listEl) {
          const title = titleEl.textContent || titleEl.innerHTML;
          // 各li要素に箇条書きスタイルを設定
          const liElements = listEl.querySelectorAll('li');
          liElements.forEach(li => {
            li.setAttribute('style', 'display: list-item !important; list-style-type: disc !important; list-style-position: inside !important; margin-bottom: 8px !important; line-height: 1.8 !important;');
            
            // li内のstrongタグにもインラインスタイルを追加して太字を強制
            const strongElements = li.querySelectorAll('strong');
            strongElements.forEach(strong => {
              strong.setAttribute('style', 'font-weight: bold !important;');
            });
          });
          const items = listEl.innerHTML;
          el.outerHTML = `<div style="border: 2px solid ${theme.color}; border-radius: 6px; margin: 1em 0; overflow: hidden;"><div style="background: ${theme.color}; color: #fff; padding: 8px 15px; font-weight: bold; margin: 0;">${title}</div><ul style="margin: 0; padding: 15px 20px 15px 40px; list-style: none; line-height: 1.8;">${items}</ul></div>`;
        }
      });
      
      // すべてのul要素にリストスタイルを適用（テーマリスト以外も対応）
      tempDiv.querySelectorAll('ul').forEach(listEl => {
        // テーマリスト内のulは除外（既に処理済み）
        if (listEl.closest('.theme-list')) {
          return;
        }
        
        // 各li要素に箇条書きスタイルを設定
        const liElements = listEl.querySelectorAll('li');
        liElements.forEach(li => {
          li.setAttribute('style', 'display: list-item !important; list-style-type: disc !important; list-style-position: inside !important; margin-bottom: 8px !important; line-height: 1.8 !important;');
          
          // li内のstrongタグにもインラインスタイルを追加
          const strongElements = li.querySelectorAll('strong');
          strongElements.forEach(strong => {
            strong.setAttribute('style', 'font-weight: bold !important;');
          });
        });
        
        // ul自体にもスタイルを設定（左パディングを増やして箇条書きのスペースを確保）
        listEl.setAttribute('style', 'margin: 1em 0; padding: 15px 20px 15px 40px; list-style: none; line-height: 1.8;');
      });
      
      // すべてのインライン装飾要素に!importantを追加
      preserveInlineFormatting(tempDiv);
      
      return tempDiv.innerHTML;
    }

    // === HTMLをブログ用にフォーマットする関数 ===
    function formatHtmlForBlog(html) {
      let formattedHtml = html;
      
      // 段落にブログシステムと同じスタイルを追加（空段落は除く）
      formattedHtml = formattedHtml.replace(/<p>(?!<br>)/g, '<p style="font-weight: normal; margin: 1em 0; line-height: 1.8;">');
      
      // 空段落（brのみ）には通常の行間と同じ高さを設定
      formattedHtml = formattedHtml.replace(/<p><br><\/p>/g, '<p style="font-weight: normal; margin: 0; line-height: 1.8;"><br></p>');
      
      // 見出しにもブログシステムに合わせた行間を調整
      formattedHtml = formattedHtml.replace(/<div style="background:([^"]+); border-left:([^"]+); padding:([^"]+); font-size:([^"]+); font-weight:([^"]+); margin:([^"]+);">/g, 
        '<div style="background:$1; border-left:$2; padding:$3; font-size:$4; font-weight: $5; margin: $6; line-height: 1.8;">');
      
      // 吹き出しにも行間を調整
      formattedHtml = formattedHtml.replace(/line-height: 1\.6/g, 'line-height: 1.8');
      
      // ボックス内のリスト項目にも行間を調整
      formattedHtml = formattedHtml.replace(/line-height: 1\.6 !important/g, 'line-height: 1.8 !important');
      
      // 改行をすべて削除（ブログシステムが<br>を自動挿入するのを防ぐ）
      formattedHtml = formattedHtml.replace(/\r\n/g, '');
      formattedHtml = formattedHtml.replace(/\n/g, '');
      formattedHtml = formattedHtml.replace(/\r/g, '');
      
      // 複数のスペースを1つに圧縮
      formattedHtml = formattedHtml.replace(/\s{2,}/g, ' ');
      
      // タグ間のスペースを削除
      formattedHtml = formattedHtml.replace(/>\s+</g, '><');
      
      return formattedHtml;
    }

          // クリップボードにコピー
          navigator.clipboard.writeText(outputHtml).then(() => {
            const charCount = outputHtml.length;
            const lineCount = (outputHtml.match(/\n/g) || []).length + 1;
            
            // 詳細なアナウンスを表示
            const message = `✅ HTMLをクリップボードにコピーしました！\n\n📊 コピー内容:\n• 文字数: ${charCount.toLocaleString()}文字\n• 行数: ${lineCount}行\n\n💡 貼り付け先:\n• テキストエディタやメモ帳にCtrl+V（Mac:⌘+V）で貼り付けできます\n• HTMLファイルとして保存してブラウザで開けばプレビューできます`;
            
            alert(message);
          }).catch(err => {
            console.error('クリップボードへのコピーに失敗しました:', err);
            alert('❌ クリップボードへのコピーに失敗しました。\nブラウザの設定を確認してください。');
          });
        },
        onPreview: (html) => {
          const previewWindow = window.open('', '_blank', 'width=800,height=600');
          previewWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="utf-8">
              <title>プレビュー</title>
              <style>
                body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.6; }
                ${document.querySelector('style').textContent}
              </style>
            </head>
            <body>
              ${html}
            </body>
            </html>
          `);
        }
      });

      // エディタ内のキーイベント制御
      // 枠（div）やリスト内でEnterキーを押したときに、ブロック分割されずに改行されるようにする
      const playground = document.getElementById('playground');
      playground.addEventListener('keydown', (e) => {
        if (e.isComposing) return; // IME入力中は処理しない
        if (e.key === 'Enter') {
          const sel = window.getSelection();
          if (!sel.rangeCount) return;
          const range = sel.getRangeAt(0);
          
          // キャレット位置の親要素を探索
          let node = range.commonAncestorContainer;
          if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
          
          // 枠(div) または リスト項目(li) の中かチェック
          let insideBlock = false;
          let current = node;
          while (current && current !== playground) {
            // 枠（divでstyle属性を持つもの、またはテーマクラスを持つもの）または li
            const isStyledDiv = current.nodeName === 'DIV' && current.getAttribute('style');
            const isThemeElement = current.classList && (
              current.classList.contains('theme-heading') ||
              current.classList.contains('theme-box') ||
              current.classList.contains('theme-bubble-left') ||
              current.classList.contains('theme-bubble-right') ||
              current.classList.contains('theme-list')
            );
            const isLi = current.nodeName === 'LI';
            
            if (isStyledDiv || isThemeElement || isLi) {
              insideBlock = true;
              break;
            }
            current = current.parentNode;
          }

          if (insideBlock) {
            // Shift+Enterの挙動（<br>挿入）を強制する
            // ...
            
            // リスト(li)の場合は、通常通りEnterで新しいliができる挙動で良いはずだが、
            // もし枠(div)の中ならbrにすべき
            if (current.nodeName === 'LI') {
               // リストの場合はデフォルト挙動（新しいli作成）に任せる
               return;
            }

            e.preventDefault();
            
            // Range APIを使って確実に改行を挿入
            const br = document.createElement('br');
            range.deleteContents(); // 選択範囲があれば削除
            range.insertNode(br);
            
            // キャレットをbrの直後に移動
            // brの後にテキストノードなどがなければ、キャレットが移動しないように見えることがある
            // そのため、ゼロ幅スペースを入れるか、キャレット位置を調整する
            range.setStartAfter(br);
            range.setEndAfter(br);
            
            // chromeなどの場合、末尾のbrは無視されることがあるため、
            // もうひとつbrが必要な場合があるが、まずはシンプルに
            
            sel.removeAllRanges();
            sel.addRange(range);
            
            // スクロール位置の調整（必要であれば）
            if (br.scrollIntoView) {
              br.scrollIntoView({ block: 'nearest', inline: 'nearest' });
            }
          }
        } else if (e.key === 'Backspace') {
          const sel = window.getSelection();
          if (!sel.rangeCount) return;
          const range = sel.getRangeAt(0);
          
          // 範囲選択されている場合はデフォルト挙動でOK
          if (!range.collapsed) return;

          // 枠(div)の中で、中身が空（または改行のみ）の場合に枠を削除する
          let node = range.commonAncestorContainer;
          if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;
          
          let current = node;
          while (current && current !== playground) {
            // 枠（divでstyle属性を持つ）
            if (current.nodeName === 'DIV' && current.getAttribute('style')) {
              // 中身のテキストを確認（トリムして空なら）
              const textContent = current.textContent.trim();
              // さらに、子要素が <br> だけ、あるいは空の場合を判定
              // textContentが空でも画像などがある場合は削除しないように注意
              const hasImages = current.querySelector('img');
              
              if (textContent === '' && !hasImages) {
                // 枠を削除して、代わりに p タグを挿入
                e.preventDefault();
                const p = document.createElement('p');
                p.innerHTML = '<br>';
                current.parentNode.insertBefore(p, current);
                current.parentNode.removeChild(current);
                
                // キャレットをpに移動
                const newRange = document.createRange();
                newRange.setStart(p, 0);
                newRange.collapse(true);
                sel.removeAllRanges();
                sel.addRange(newRange);
                return;
              }
              break;
            }
            current = current.parentNode;
          }
        }
      });
      
      // イベントリスナー設定（エディタ初期化後に設定）
      document.getElementById('btn-apply-theme').onclick = applyThemeToGeminiHtml;
    }

    // カスタムツール全種サンプルを生成
    function generateCustomToolSamples() {
      if (!editor || !window.MOCA_TEMPLATES) return;
      
      let content = '<h2 style="border-bottom: 3px solid #333; padding-bottom: 10px;">🔧 カスタムツール全種サンプル</h2>';
      
      // 用途別に分類
      const categories = {
        'heading': { label: '📝 見出し', items: [] },
        'box': { label: '📦 枠・BOX', items: [] },
        'bubble': { label: '💬 吹き出し', items: [] },
        'list': { label: '📋 リスト', items: [] },
        'button': { label: '🔘 ボタン', items: [] }
      };
      
      window.MOCA_TEMPLATES.forEach(t => {
        t.roles.forEach(role => {
          if (categories[role]) {
            categories[role].items.push(t);
          }
        });
      });
      
      for (const [role, category] of Object.entries(categories)) {
        content += `<h3 style="background: #34495e; color: #fff; padding: 10px 15px; margin-top: 30px; border-radius: 5px;">${category.label}</h3>`;
        
        category.items.forEach(t => {
          content += `<p style="margin-top: 20px;"><strong>【No.${t.no}】${t.label}</strong></p>`;
          content += t.html;
        });
        
        content += '<hr style="margin: 40px 0; border: none; border-top: 2px dashed #ddd;">';
      }
      
      editor.setContent(content);
    }

      let outputHtml = html;
      outputHtml = outputHtml.replace(/data-onclick="([^"]*)" onclick="event\.preventDefault\(\);"/g, 'onclick="$1"');
      
      latestHtml = outputHtml;
      document.getElementById('html-output').textContent = outputHtml;
      navigator.clipboard.writeText(outputHtml);
    }

    // === GEMINI HTMLにテーマを適用する関数 ===
    function applyThemeToGeminiHtml() {
      let geminiHtml = document.getElementById('gemini-html-input').value.trim();
      if (!geminiHtml) {
        alert('GEMINI HTMLを貼り付けてください');
        return;
      }

      // 現在選択中のテーマを取得
      const themeSelector = document.querySelector('.theme-selector');
      const selectedTheme = themeSelector ? themeSelector.value : 'business-blue';
      const theme = window.PRESET_THEMES[selectedTheme];
      if (!theme) {
        alert('テーマが選択されていません');
        return;
      }

      console.log('選択されたテーマ:', selectedTheme);
      console.log('テーマオブジェクト:', theme);

      // テーマCSSを動的に追加
      addThemeStyles(selectedTheme, theme);

      // エスケープされたHTMLタグをデコード（\< → <, \> → > など）
      geminiHtml = geminiHtml.replace(/\\</g, '<').replace(/\\>/g, '>');
      
      // HTMLエンティティもデコード（&lt; → <, &gt; → > など）
      if (geminiHtml.includes('&lt;') || geminiHtml.includes('&gt;')) {
        const decoder = document.createElement('textarea');
        decoder.innerHTML = geminiHtml;
        geminiHtml = decoder.value;
      }
      console.log('デコード後のHTML:', geminiHtml.substring(0, 100) + '...');

      // HTMLを解析
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = geminiHtml;

      // CTAセクション（data-cta-protected）を事前に退避しておく
      const ctaNodes = Array.from(tempDiv.querySelectorAll('[data-cta-protected]'));
      const ctaHtml = ctaNodes.map(node => node.outerHTML).join('\n');
      ctaNodes.forEach(node => node.remove());

      // 結果を格納
      let themedHtml = '';

      // 各要素を処理（吹き出し内の要素を除外）
      const elements = tempDiv.querySelectorAll('h1, h2, h3, h4, h5, h6, p, ul, ol, blockquote, table, div[class*="bubble"]');
      const filteredElements = Array.from(elements).filter(el => {
        // 吹き出しdiv自体は保持し、吹き出し内の子要素のみ除外
        return el.classList.contains('bubble-left') || 
               el.classList.contains('bubble-right') || 
               !el.closest('div[class*="bubble"]');
      });
      console.log('検出された要素数:', filteredElements.length);

      if (filteredElements.length === 0) {
        // HTMLタグがない場合はそのままテキストとして出力
        themedHtml = `<p>${geminiHtml}</p>`;
      } else {
        // 各要素を順番に処理
        filteredElements.forEach((el, index) => {
          const tagName = el.tagName.toLowerCase();
          console.log(`要素 ${index + 1}:`, tagName, el.textContent.substring(0, 30) + '...');

          switch (tagName) {
            case 'h1':
            case 'h2':
              // H2見出し → テーマの見出しテンプレートを適用
              themedHtml += theme.html.heading.replace('{{text}}', el.textContent);
              break;
            case 'h3':
              // H3サブ見出し → テーマのサブ見出しテンプレートを適用
              themedHtml += theme.html.subheading.replace('{{text}}', el.textContent);
              break;
            case 'h4':
            case 'h5':
            case 'h6':
              // H4-H6 → H2見出しテンプレートを適用
              themedHtml += theme.html.heading.replace('{{text}}', el.textContent);
              break;

            case 'p':
              // 段落 → 装飾なしの通常テキスト
              themedHtml += `<p>${el.innerHTML}</p>`;
              break;

            case 'ul':
            case 'ol':
              // リスト → テーマのリストテンプレートを適用
              const items = Array.from(el.querySelectorAll('li')).map(li => `<li>${li.innerHTML}</li>`).join('');
              themedHtml += theme.html.list.replace('{{title}}', 'ポイント').replace('{{items}}', items);
              break;

            case 'blockquote':
              // blockquote は装飾タグとして無視（中の ul/ol は個別に処理される）
              // blockquote 自体は出力しない
              break;
            case 'table':
              // テーブル → エスケープされたCSSを修正して出力（CTAボタン用）
              console.log('検出されたテーブルHTML:', el.outerHTML);
              let tableHtml = el.outerHTML;
              // エスケープされたCSSを修正（\# → #）
              tableHtml = tableHtml.replace(/\\#/g, '#');
              themedHtml += tableHtml;
              break;

            default:
              // 吹き出し要素の処理
              if (el.className.includes('bubble-left')) {
                // 左吹き出し → テーマの左吹き出しテンプレートを適用
                themedHtml += theme.html.bubbleLeft.replace('{{text}}', el.innerHTML);
              } else if (el.className.includes('bubble-right')) {
                // 右吹き出し → テーマの右吹き出しテンプレートを適用
                themedHtml += theme.html.bubbleRight.replace('{{text}}', el.innerHTML);
              } else {
                // その他はそのまま
                themedHtml += el.outerHTML;
              }
              break;
          }
        });
      }

      // 退避しておいたCTAセクションを末尾にそのまま付与
      if (ctaHtml) {
        themedHtml += '\n\n' + ctaHtml;
      }

      console.log('生成されたHTML:', themedHtml);

      // エディタに設定
      if (themedHtml.trim()) {
        if (editor && editor.setContent) {
          editor.setContent(themedHtml);
        } else {
          const editorElement = document.querySelector('.eisai-editor');
          if (editorElement) {
            editorElement.innerHTML = themedHtml;
          }
        }
        document.getElementById('gemini-html-input').value = '';
        alert('テーマを適用しました！');
      } else {
        alert('変換できる要素が見つかりませんでした');
      }
    }
